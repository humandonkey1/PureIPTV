name: Build Premium APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install pyside6 shiboken6 requests python-mpv

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with PySide6 Deploy
        run: |
          # Пытаемся собрать APK
          pyside6-android-deploy --spec pysidedeploy.spec

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PureIPTV-Premium
          path: "*.apk"
