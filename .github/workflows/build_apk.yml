name: Build Premium APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev wget unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install pyside6 shiboken6 requests python-mpv
          pip install jinja2 pkginfo tqdm "packaging==24.1"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Настройка путей для сборщика (важный шаг!)
      - name: Set Android Environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Находим путь к NDK (обычно он там)
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)
          echo "ANDROID_NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      # Инициализация и скачивание Android Wheels
      - name: Initialize PySide6 Android Support
        run: |
          # Эта команда скачает нужные библиотеки PySide6 для Android
          pyside6-android-deploy --init --sdk-path $ANDROID_SDK_ROOT --ndk-path $ANDROID_NDK_PATH

      - name: Build APK
        run: |
          # Теперь запускаем саму сборку
          pyside6-android-deploy --spec pysidedeploy.spec --sdk-path $ANDROID_SDK_ROOT --ndk-path $ANDROID_NDK_PATH

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "*.apk"
      # 5. Настраиваем Java (нужна для Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Запускаем процесс сборки APK
      - name: Run PySide6 Android Deploy
        run: |
          # Используем спецификацию из файла pysidedeploy.spec
          pyside6-android-deploy --spec pysidedeploy.spec

      # 7. Сохраняем готовый APK файл как артефакт (можно будет скачать)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium-Build
          path: "*.apk"
          if-no-files-found: error
          retention-days: 7
