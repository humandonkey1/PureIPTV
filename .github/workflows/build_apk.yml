name: Build Premium APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev wget unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем PySide6 и специальную утилиту qtpip
          pip install pyside6 shiboken6 requests python-mpv qtpip
          pip install jinja2 pkginfo tqdm "packaging==24.1"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # АВТОМАТИЧЕСКОЕ СКАЧИВАНИЕ ANDROID WHEELS ЧЕРЕЗ QTPIP
      - name: Download Android Wheels
        run: |
          mkdir -p wheels
          # Скачиваем PySide6 и Shiboken6 для Android aarch64
          qtpip download PySide6 --android --arch aarch64 --dest wheels
          qtpip download shiboken6 --android --arch aarch64 --dest wheels
          
          # Находим пути к скачанным файлам и сохраняем в переменные окружения
          echo "WHEEL_PYSIDE=$(ls wheels/PySide6*.whl | head -n 1)" >> $GITHUB_ENV
          echo "WHEEL_SHIBOKEN=$(ls wheels/shiboken6*.whl | head -n 1)" >> $GITHUB_ENV

      - name: Set Android Environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)
          echo "ANDROID_NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          # Запускаем сборку с использованием путей, найденных qtpip
          pyside6-android-deploy \
            --spec pysidedeploy.spec \
            --wheel-pyside ${{ env.WHEEL_PYSIDE }} \
            --wheel-shiboken ${{ env.WHEEL_SHIBOKEN }} \
            --sdk-path $ANDROID_SDK_ROOT \
            --ndk-path $ANDROID_NDK_PATH

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "*.apk"
