name: Build Premium APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Убрали realpath, так как он уже есть в системе
          sudo apt-get install -y libmpv-dev libegl1-mesa-dev wget unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK in Virtual Environment
        run: |
          # Создаем виртуальное окружение
          python -m venv venv
          source venv/bin/activate
          
          pip install --upgrade pip
          pip install pyside6==6.7.2 shiboken6==6.7.2 requests python-mpv qtpip
          pip install jinja2 pkginfo tqdm "packaging==24.1"
          
          # Скачиваем Android-библиотеки
          mkdir -p wheels_dir
          python -m qtpip download PySide6 --android --arch aarch64 --dest wheels_dir
          python -m qtpip download shiboken6 --android --arch aarch64 --dest wheels_dir
          
          # Находим пути к файлам. Берем строго один файл (первый в списке)
          PYSIDE_WHEEL=$(ls -1 wheels_dir/PySide6-*.whl | head -n 1)
          SHIBOKEN_WHEEL=$(ls -1 wheels_dir/shiboken6-*.whl | head -n 1)
          
          # Превращаем в полный путь
          PYSIDE_PATH=$(readlink -f "$PYSIDE_WHEEL")
          SHIBOKEN_PATH=$(readlink -f "$SHIBOKEN_WHEEL")
          
          echo "Using PySide Wheel: $PYSIDE_PATH"
          echo "Using Shiboken Wheel: $SHIBOKEN_PATH"

          # Находим путь к Android NDK (он предустановлен на GitHub)
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)
          echo "Using NDK: $NDK_PATH"

          # Запуск сборки
          pyside6-android-deploy \
            -c pysidedeploy.spec \
            --wheel-pyside "$PYSIDE_PATH" \
            --wheel-shiboken "$SHIBOKEN_PATH" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$NDK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "*.apk"
