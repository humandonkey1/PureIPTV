name: Build Premium APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget unzip jq curl \
            libmpv-dev \
            libdouble-conversion3 \
            libxcb-cursor0 \
            libpcre2-16-0 \
            libfontconfig1 \
            libx11-xcb1 \
            libicu-dev \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            lld \
            libssl-dev \
            autoconf automake libtool

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Android SDK layout
        run: |
          sudo ln -sf $ANDROID_HOME/cmdline-tools/latest $ANDROID_HOME/tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython pyside6==6.8.0 shiboken6==6.8.0 \
            requests python-mpv qtpip jinja2 pkginfo tqdm "packaging==24.1"

      - name: Download libmpv.so for Android (arm64-v8a)
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/mpv-android/mpv-android/releases/latest \
            | jq -r '.assets[] | select(.name | contains("arm64-v8a")) | .browser_download_url')
          wget "$ASSET_URL" -O donor.apk
          unzip donor.apk "lib/arm64-v8a/libmpv.so" -d .
          mv lib/arm64-v8a/libmpv.so .
          rm -rf donor.apk lib

      - name: Download PySide6 wheels for Android
        run: |
          mkdir -p wheels_dir
          cd wheels_dir
          wget https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          wget https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          cd ..

      - name: Locate NDK path
        id: paths
        run: |
          echo "NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)" >> $GITHUB_OUTPUT

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK with pyside6-android-deploy
        run: |
          PYSIDE_PATH=$(readlink -f wheels_dir/PySide6-*.whl)
          SHIBOKEN_PATH=$(readlink -f wheels_dir/shiboken6-*.whl)
          
          yes | pyside6-android-deploy \
            -v \
            -f \
            -c pysidedeploy.spec \
            --wheel-pyside "$PYSIDE_PATH" \
            --wheel-shiboken "$SHIBOKEN_PATH" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "${{ steps.paths.outputs.NDK_PATH }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "**/*.apk"
