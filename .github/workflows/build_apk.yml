name: Build Premium APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip jq curl libmpv-dev libdouble-conversion3 libxcb-cursor0 libpcre2-16-0 libfontconfig1 libx11-xcb1 libicu-dev libxkbcommon-x11-0 libdbus-1-3 lld libssl-dev autoconf automake libtool

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Process
        run: |
          # Ставим всё глобально, без venv
          python -m pip install --upgrade pip
          pip install buildozer cython pyside6==6.8.0 shiboken6==6.8.0 requests python-mpv qtpip jinja2 pkginfo tqdm "packaging==24.1"
          
          # Забираем libmpv.so
          ASSET_URL=$(curl -s https://api.github.com/repos/mpv-android/mpv-android/releases/latest | jq -r '.assets[] | select(.name | contains("arm64-v8a")) | .browser_download_url')
          wget "$ASSET_URL" -O donor.apk
          unzip donor.apk "lib/arm64-v8a/libmpv.so" -d .
          mv lib/arm64-v8a/libmpv.so .
          rm donor.apk

          # Качаем Wheels
          mkdir -p wheels_dir
          cd wheels_dir
          wget https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          wget https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.8.0-6.8.0-cp311-cp311-android_aarch64.whl
          cd ..
          
          PYSIDE_PATH=$(readlink -f wheels_dir/PySide6-*.whl)
          SHIBOKEN_PATH=$(readlink -f wheels_dir/shiboken6-*.whl)
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | tail -n 1)

          # ИНИЦИАЛИЗАЦИЯ (теперь без --build-type)
          yes | pyside6-android-deploy \
            --init \
            --wheel-pyside "$PYSIDE_PATH" \
            --wheel-shiboken "$SHIBOKEN_PATH" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$NDK_PATH"

          # СБОРКА
          yes | pyside6-android-deploy \
            -v \
            -c pysidedeploy.spec \
            --wheel-pyside "$PYSIDE_PATH" \
            --wheel-shiboken "$SHIBOKEN_PATH" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$NDK_PATH"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Premium
          path: "**/*.apk"
          if-no-files-found: error
