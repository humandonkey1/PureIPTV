name: Build and Compress with MPRESS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv pyinstaller

      - name: Build EXE with PyInstaller (onedir, no compression)
        run: |
          pyinstaller --onedir `
            --add-data "main.qml;." `
            --add-data "mpv;mpv" `
            --hidden-import PySide6.QtQml `
            --hidden-import PySide6.QtQuick `
            --strip `
            --name PureIPTV `
            main.py

      - name: Download MPRESS from GitHub mirror (requaos/mPress)
        run: |
          curl -L -o mpress.exe "https://github.com/requaos/mPress/raw/main/mpress.exe"
          if (-not (Test-Path mpress.exe)) {
            Write-Host "❌ mpress.exe not downloaded!"
            exit 1
          }
          # Проверяем заголовок EXE (MZ) через -AsByteStream (работает в PS 7+)
          $bytes = Get-Content -Path mpress.exe -TotalCount 2 -AsByteStream -ReadCount 2
          $header = ($bytes[0], $bytes[1]) -join ','
          if ($header -ne "77,90") {
            Write-Host "❌ Downloaded file is not a valid EXE (header: $header)"
            exit 1
          }
          Write-Host "✅ mpress.exe downloaded successfully"
        shell: pwsh

      - name: Compress EXE with MPRESS (maximum LZMA)
        run: |
          .\mpress.exe -s -b dist\PureIPTV\PureIPTV.exe
        shell: pwsh

      - name: Test EXE (check for Python DLL errors)
        run: |
          Write-Host "🧪 Testing PureIPTV.exe for Python DLL loading issues..."
          $exePath = "dist\PureIPTV\PureIPTV.exe"
          $output = & $exePath 2>&1
          $exitCode = $LASTEXITCODE
          
          Write-Host "📄 Output:"
          Write-Host $output
          
          $errorPattern = "Failed to load Python DLL|Invalid access to memory location|python311.dll"
          if ($output -match $errorPattern) {
            Write-Host "❌ Python DLL Error detected!"
            Write-Host "🔍 Error details: $($output -match $errorPattern)"
            exit 1
          }
          
          if ($exitCode -ne 0) {
            Write-Host "⚠️ EXE crashed with exit code $exitCode, but no Python DLL error found."
          } else {
            Write-Host "✅ EXE loaded Python DLL successfully and executed without fatal errors."
          }
          
          Write-Host "🎉 Test passed! The EXE is safe to download."
        shell: pwsh
        timeout-minutes: 2

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-EXE
          path: dist/PureIPTV/PureIPTV.exe
