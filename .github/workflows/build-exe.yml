name: Build Windows EXE with UPX (Final Fix)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv pyinstaller

      - name: Download UPX
        run: |
          curl -L https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          Expand-Archive -Path upx.zip -DestinationPath upx
          echo "$env:GITHUB_WORKSPACE/upx/upx-4.2.4-win64" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Build with PyInstaller (onedir, exclude all DLL and PYD from UPX)
        run: |
          pyinstaller --onedir `
            --add-data "main.qml;." `
            --add-data "mpv;mpv" `
            --hidden-import PySide6.QtQml `
            --hidden-import PySide6.QtQuick `
            --strip `
            --upx-exclude "*.dll" `
            --upx-exclude "*.pyd" `
            --upx-dir "$env:GITHUB_WORKSPACE/upx/upx-4.2.4-win64" `
            --name PureIPTV `
            main.py

      - name: Compress only PureIPTV.exe with UPX (not touching DLLs)
        run: |
          upx --best --lzma --force dist/PureIPTV/PureIPTV.exe
        shell: pwsh

      - name: Test EXE (check for Python DLL errors)
        run: |
          Write-Host "🧪 Testing PureIPTV.exe for Python DLL loading issues..."
          $exePath = "dist\PureIPTV\PureIPTV.exe"
          $output = & $exePath 2>&1
          $exitCode = $LASTEXITCODE
          
          Write-Host "📄 Output:"
          Write-Host $output
          
          $errorPattern = "Failed to load Python DLL|Invalid access to memory location|python311.dll"
          if ($output -match $errorPattern) {
            Write-Host "❌ Python DLL Error detected!"
            Write-Host "🔍 Error details: $($output -match $errorPattern)"
            exit 1
          }
          
          if ($exitCode -ne 0) {
            Write-Host "⚠️ EXE crashed with exit code $exitCode, but no Python DLL error found."
          } else {
            Write-Host "✅ EXE loaded Python DLL successfully and executed without fatal errors."
          }
          
          Write-Host "🎉 Test passed! The EXE is safe to download."
        shell: pwsh
        timeout-minutes: 2

      - name: Zip the folder
        run: |
          Compress-Archive -Path dist/PureIPTV/* -DestinationPath PureIPTV-Portable.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Portable
          path: PureIPTV-Portable.zip
