name: Build with Nuitka (Fixed QML)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv
          pip install nuitka

      - name: Build EXE with Nuitka (include QML plugins)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --include-data-dir=mpv=mpv `
            --include-data-file=main.qml=main.qml `
            --include-qt-plugins=qml `
            --include-package=PySide6 `
            --assume-yes-for-downloads `
            --output-dir=build `
            main.py

      - name: Find EXE file path
        id: find_exe
        run: |
          $exePath = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "✅ Found EXE at: $($exePath.FullName)"
            echo "EXE_PATH=$($exePath.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "❌ No EXE found in build folder!"
            exit 1
          }
        shell: pwsh

      - name: Pack EXE into ZIP
        run: |
          Compress-Archive -Path "$env:EXE_PATH" -DestinationPath PureIPTV.zip
          if (Test-Path "PureIPTV.zip") {
            Write-Host "✅ ZIP archive created: PureIPTV.zip"
            $size = (Get-Item "PureIPTV.zip").Length
            Write-Host "📦 Archive size: $([math]::Round($size/1MB, 2)) MB"
          } else {
            Write-Host "❌ Failed to create ZIP archive"
            exit 1
          }
        shell: pwsh

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-Nuitka
          path: PureIPTV.zip
