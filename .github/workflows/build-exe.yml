name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-mpv pyinstaller

      - name: Download UPX
        run: |
          curl -L https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          Expand-Archive -Path upx.zip -DestinationPath upx
          echo "$env:GITHUB_WORKSPACE/upx/upx-4.2.4-win64" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile `
            --add-data "main.qml;." `
            --add-data "mpv;mpv" `
            --hidden-import PySide6.QtQml `
            --hidden-import PySide6.QtQuick `
            --strip `
            --name PureIPTV `
            main.py

      - name: Compress with UPX (force mode, disables CFG protection)
        run: |
          upx --best --lzma --force dist/PureIPTV.exe
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureIPTV-EXE
          path: dist/PureIPTV.exe
