name: Unpack Archive

on:
  push:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd unrar

      - name: Detect and extract archive
        run: |
          for archive in *.tar.zst *.tar.gz *.tar.xz *.tar.bz2 *.zip *.rar; do
            if [ -f "$archive" ]; then
              echo "📦 Found: $archive"
              
              file_type=$(file -b --mime-type "$archive")
              echo "🔍 MIME type: $file_type"
              
              case "$file_type" in
                application/zip)
                  echo "📦 Extracting as zip"
                  unzip -q "$archive"
                  rm -v "$archive"
                  ;;
                application/x-tar|application/zstd)
                  echo "📦 Extracting as tar/zstd"
                  tar -xf "$archive"
                  rm -v "$archive"
                  ;;
                application/gzip)
                  echo "📦 Extracting as gzip (tar.gz)"
                  tar -xzf "$archive"
                  rm -v "$archive"
                  ;;
                application/x-xz)
                  echo "📦 Extracting as xz (tar.xz)"
                  tar -xf "$archive"
                  rm -v "$archive"
                  ;;
                application/x-bzip2)
                  echo "📦 Extracting as bzip2 (tar.bz2)"
                  tar -xjf "$archive"
                  rm -v "$archive"
                  ;;
                application/vnd.rar|application/x-rar)
                  echo "📦 Extracting as rar"
                  unrar x -y "$archive"
                  rm -v "$archive"
                  ;;
                *)
                  echo "⚠️ Unknown MIME type: $file_type"
                  if tar -tf "$archive" &>/dev/null; then
                    echo "📦 Trying to extract as tar"
                    tar -xf "$archive"
                    rm -v "$archive"
                  else
                    echo "❌ Failed to extract $archive"
                  fi
                  ;;
              esac
            fi
          done

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "📦 Auto-extract archive and cleanup"
          git push
