name: Pure IPTV — ultra compact

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install nuitka zstandard
          pip install PySide6-Essentials requests python-mpv

      - name: Nuitka standalone + LTO
        run: |
          python -m nuitka `
            --standalone `
            --lto=yes `
            --enable-plugin=pyside6 `
            --include-qt-plugins=sensible,qml `
            --windows-console-mode=disable `
            --include-data-dir=mpv=mpv `
            --include-data-file=main.qml=main.qml `
            --noinclude-pytest-mode=nofollow `
            --noinclude-unittest-mode=nofollow `
            --noinclude-setuptools-mode=nofollow `
            --assume-yes-for-downloads `
            --output-dir=build `
            main.py

      - name: Find build folder
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "main.exe" | Select-Object -First 1
          if (-not $exe) { throw "No exe" }
          $dir = $exe.Directory.FullName
          $before = (Get-ChildItem -Path $dir -Recurse | Measure-Object -Property Length -Sum).Sum
          "EXE_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BEFORE=$([math]::Round($before/1MB, 1))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Folder: $dir"
          Write-Host "Before UPX: $([math]::Round($before/1MB, 1)) MB"

      - name: UPX — НЕ сжимаем VCRUNTIME и MSVCP!
        shell: pwsh
        run: |
          curl -sL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          tar -xf upx.zip
          $upx = "$pwd\upx-4.2.4-win64\upx.exe"
          
          Get-ChildItem -Path "$env:EXE_DIR" -Include *.dll,*.exe,*.pyd -Recurse | ForEach-Object {
            $name = $_.Name.ToLower()
            # 🚫 Пропускаем VCRUNTIME, MSVCP, python DLL — UPX их ломает!
            if ($name -like "vcruntime*" -or $name -like "msvcp*" -or $name -like "python3*") {
              Write-Host "⏭️ SKIP: $($_.Name)"
              return
            }
            Write-Host "📦 UPX: $($_.Name)"
            & $upx --best --lzma $_.FullName --force --no-progress 2>&1 | Out-Null
          }
          Write-Host "UPX done"

      - name: Show result and ZIP
        shell: pwsh
        run: |
          $after = (Get-ChildItem -Path $env:EXE_DIR -Recurse | Measure-Object -Property Length -Sum).Sum
          $before = [double]$env:BEFORE
          Write-Host "Before: $before MB"
          Write-Host "After:  $([math]::Round($after/1MB, 1)) MB"
          Write-Host "Saved:  $([math]::Round(($before-$after)/$before*100, 1))%"
          Compress-Archive -Path "$env:EXE_DIR\*" -DestinationPath PureIPTV.zip
          Write-Host "ZIP: $([math]::Round((Get-Item PureIPTV.zip).Length/1MB, 1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: PureIPTV
          path: PureIPTV.zip
